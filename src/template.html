<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>ARDET</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>/* __CSS__ */</style>
</head>
<body>
<div id="gw"><canvas id="game"></canvas></div>
<div id="entry"><div id="entry-left"><div id="entry-logo">ARDET</div><button id="entry-btn">В ПУСТОТУ 25+</button></div></div>
<div id="menu">
  <div id="menu-inscription"></div>
  <div class="mi" data-a="look"><i>☠</i>ОСМОТРЕТЬ</div>
  <div class="mi" data-a="use"><i>✋</i>ИСПОЛЬЗОВАТЬ</div>
  <div class="mi" data-a="talk"><i>💬</i>ГОВОРИТЬ</div>
  <div class="mi" data-a="listen"><i>♫</i>СЛУШАТЬ</div>
  <div class="mi" data-a="take"><i>◆</i>ВЗЯТЬ</div>
  <div class="mi" data-a="cancel"><i>✕</i>ОТМЕНА</div>
</div>
<div id="look"><h3 id="lt"></h3><div id="lb"></div><div id="li"></div></div>
<div id="dlg"><div id="dp"><canvas id="dpc" width="80" height="100"></canvas></div><div id="dd"><div id="dn"></div><div id="dt"></div><div id="do"></div></div></div>
<div id="term"><input id="ti" type="text" autocomplete="off" spellcheck="false"><div id="to"></div></div>
<canvas id="cur" width="20" height="20"></canvas>
